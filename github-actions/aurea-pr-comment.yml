name: aurea compliance

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  aurea:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Run aurea compliance
        id: aurea
        shell: bash
        run: |
          set +e
          .harness/bin/harness check --ci --gate report-only > aurea-report.md
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Comment aurea report
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- aurea-compliance-report -->";
            const report = fs.existsSync("aurea-report.md")
              ? fs.readFileSync("aurea-report.md", "utf8")
              : "aurea did not produce a report.";
            const exitCode = "${{ steps.aurea.outputs.exit_code || 'unknown' }}";
            const body = [
              marker,
              "## aurea compliance",
              "",
              `Exit code: \`${exitCode}\``,
              "",
              report,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
